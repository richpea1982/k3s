apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.pearsalls.fr`)
      kind: Rule
      middlewares:
        - name: argocd-admin-only
      services:
        # Port 80 — argocd-server is running with server.insecure: true,
        # same as vaultwarden's backend; Traefik terminates TLS.
        - name: argocd-server
          port: 80
  tls:
    certResolver: cloudflare
