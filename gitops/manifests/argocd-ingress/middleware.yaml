apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-admin-only
  namespace: argocd
spec:
  ipAllowList:
    sourceRange:
      # VLAN10 (management) only — same scope as the "MGMT -> all VLANs"
      # OPNsense rule. Not opened to VLAN20/30 at all: nothing in the
      # cluster itself needs to reach the ArgoCD UI, only you do.
      - 10.0.0.0/16
      # Tailscale CGNAT range — remove once WireGuard migration lands and
      # replace with whatever subnet the WireGuard client pool ends up on.
      - 100.64.0.0/10
      - 10.42.0.0/16
