kubectl apply -f - <<'EOF'
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-services-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  services-health.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "title": "Services at a Glance",
      "tags": ["k3s", "health"],
      "timezone": "browser",
      "schemaVersion": 38,
      "panels": [
        {
          "title": "Pod Health & Resource Usage",
          "type": "table",
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"}) by (namespace, pod)",
              "legendFormat": "{{namespace}} / {{pod}} (Running)",
              "format": "table",
              "instant": true
            },
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])) by (namespace, pod)",
              "legendFormat": "CPU Usage",
              "format": "table",
              "instant": true
            },
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(container_memory_working_set_bytes{container!=\"\"}) by (namespace, pod)",
              "legendFormat": "RAM Usage",
              "format": "table",
              "instant": true
            }
          ]
        }
      ]
    }
EOF
