apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-services-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  services-health.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "title": "Services at a Glance",
      "tags": ["k3s", "health"],
      "timezone": "browser",
      "schemaVersion": 38,
      "panels": [
        {
          "title": "Pod Health & Resource Usage",
          "type": "table",
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"}) by (namespace, pod)",
              "legendFormat": "Running",
              "format": "table",
              "instant": true,
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])) by (namespace, pod)",
              "legendFormat": "CPU",
              "format": "table",
              "instant": true,
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(container_memory_working_set_bytes{container!=\"\"}) by (namespace, pod) / sum(kube_pod_container_resource_limits{resource=\"memory\"}) by (namespace, pod)",
              "legendFormat": "RAM",
              "format": "table",
              "instant": true,
              "refId": "C"
            }
          ],
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true
                },
                "renameByName": {
                  "Value #A": "Status (Running)",
                  "Value #B": "CPU Usage (% of Core)",
                  "Value #C": "RAM Usage (% of Limit)"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                }
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "CPU Usage (% of Core)"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "percentunit"
                  },
                  {
                    "id": "decimals",
                    "value": 2
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "RAM Usage (% of Limit)"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "percentunit"
                  },
                  {
                    "id": "decimals",
                    "value": 1
                  }
                ]
              }
            ]
          }
        }
      ]
    }
