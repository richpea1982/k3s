apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jellyfin-admin-only
  namespace: jellyfin
spec:
  ipAllowList:
    sourceRange:
      # Management VLAN (VLAN10) — same scope as photoprism-admin-only / grafana-admin-only
      - 10.0.0.0/16
      # Tailscale CGNAT range — replace with the WireGuard client subnet once that migration lands
      - 100.64.0.0/10
