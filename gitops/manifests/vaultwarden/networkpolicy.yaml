apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vaultwarden-isolation
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: vaultwarden
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only Traefik may reach the app — same pattern as the portfolio policy.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 80
    # Kubelet health probes come from the node IP, not a pod.
    - from:
        - ipBlock:
            cidr: 10.0.20.0/24
      ports:
        - protocol: TCP
          port: 80
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Postgres, same namespace
    - to:
        - podSelector:
              matchLabels:
                app: postgres
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-isolation
  namespace: vaultwarden
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    # Only the Vaultwarden pod may reach the database — nothing else in
    # or out of the cluster gets a path to it.
    - from:
        - podSelector:
            matchLabels:
              app: vaultwarden
      ports:
        - protocol: TCP
          port: 5432
    # Nightly pg_dump CronJob. Deliberately a separate rule with its own
    # label rather than reusing "app: vaultwarden" — that label also
    # matches the vaultwarden Service's selector, which a recurring job
    # (unlike the one-off migration pods) shouldn't ever risk colliding
    # with.
    - from:
        - podSelector:
            matchLabels:
              job: postgres-backup
      ports:
        - protocol: TCP
          port: 5432
