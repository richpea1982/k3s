apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup
  namespace: vaultwarden
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 2Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: vaultwarden
spec:
  # 00:30 — ahead of Velero's 01:00 daily schedule, so each night's dump
  # is on disk and gets swept into that backup, not left for the next one.
  schedule: "30 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            # Deliberately NOT "app: vaultwarden" — that label also matches
            # the vaultwarden Service's selector, which would make this
            # pod a valid (wrong) target for real app traffic for however
            # long each run lasts. Dedicated label + dedicated
            # NetworkPolicy rule instead — see networkpolicy.yaml.
            job: postgres-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              envFrom:
                - secretRef:
                    name: vaultwarden-secrets
              command:
                - sh
                - -c
                - |
                  set -e
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  RAW="/backup/vaultwarden-${STAMP}.sql"
                  FILE="${RAW}.gz"

                  echo "Dumping to ${RAW}..."
                  # Deliberately NOT piped into gzip directly — in a shell
                  # pipeline, `set -e` only sees the LAST command's exit
                  # code. A failed pg_dump piped into a successful gzip
                  # would report success on an empty/broken backup. Writing
                  # to a plain file first means pg_dump's own exit code is
                  # what set -e actually checks.
                  PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                    -h postgres -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" \
                    -F p > "${RAW}"

                  # Sanity check: a real dump of this vault is tens of KB
                  # at minimum. Catches a "succeeded but suspiciously
                  # empty" dump that an exit-code check alone might miss.
                  SIZE=$(wc -c < "${RAW}")
                  if [ "${SIZE}" -lt 1024 ]; then
                    echo "ERROR: dump is suspiciously small (${SIZE} bytes) — refusing to keep it"
                    rm -f "${RAW}"
                    exit 1
                  fi

                  gzip "${RAW}"
                  echo "Dump complete: $(ls -lh ${FILE})"

                  echo "Pruning dumps older than 7 days..."
                  find /backup -name "vaultwarden-*.sql.gz" -mtime +7 -print -delete
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: postgres-backup
