# Internal-only route — reachable via WireGuard once the private-access
# migration lands, Tailscale in the meantime. Deliberately NOT routed
# through the cloudflared tunnel; see VAULTWARDEN-README.md.
#
# NOTE: vaultwarden.local.lan requires Unbound split-horizon DNS on
# OPNsense, which is still planned/not yet built. Until then, resolve it
# manually (e.g. an /etc/hosts entry on your admin machine pointing at
# the Traefik service's node IP) or via `kubectl port-forward`.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`vaultwarden.local.lan`)
      kind: Rule
      services:
        - name: vaultwarden
          port: 80
