# Internal-only route — reachable via WireGuard once the private-access
# migration lands, Tailscale in the meantime. Deliberately NOT routed
# through the cloudflared tunnel; see VAULTWARDEN-README.md.
#
# vault.pearsalls.fr is a real subdomain of a domain we control (needed
# for Let's Encrypt DNS-01 — see TRAEFIK-TLS-README.md) but has NO public
# A/CNAME record and is never reachable from the internet. Resolve it
# manually via an /etc/hosts entry on your admin machine pointing at a
# K3s node IP (e.g. 10.0.20.21), or `kubectl port-forward`.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vault.pearsalls.fr`)
      kind: Rule
      services:
        - name: vaultwarden
          port: 80
  tls:
    certResolver: cloudflare
