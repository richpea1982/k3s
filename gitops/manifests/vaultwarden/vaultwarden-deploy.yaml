apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultwarden-data
  namespace: vaultwarden
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  replicas: 1
  strategy:
    type: Recreate # single RWO volume — never run two pods against it during a rollout
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w2 postgres 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.36.0-alpine
          ports:
            - containerPort: 80
          env:
            - name: DOMAIN
              value: "https://vault.pearsalls.fr"
            - name: SIGNUPS_ALLOWED
              value: "true" # IMPORTANT: set to "false" and re-sync once your account exists — see VAULTWARDEN-README.md step 3
            - name: WEBSOCKET_ENABLED
              value: "true"
          envFrom:
            - secretRef:
                # Provides DATABASE_URL and ADMIN_TOKEN.
                # Created manually — see VAULTWARDEN-README.md. Not in Git.
                name: vaultwarden-secrets
          volumeMounts:
            - name: vaultwarden-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: vaultwarden-data
          persistentVolumeClaim:
            claimName: vaultwarden-data
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  selector:
    app: vaultwarden
  ports:
    - port: 80
      targetPort: 80
