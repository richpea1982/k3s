# You don't have a dynamic NFS StorageClass/provisioner in the cluster —
# every NFS consumer so far (Jellyfin's LXC, Seafile's LXC) has mounted the
# NAS export directly at the OS level. This is the K8s-native equivalent:
# a statically-defined PersistentVolume pointing straight at the existing
# NAS export (storage_pool/photoprism, already provisioned by nas_setup),
# bound by a matching PVC. No provisioner needed for a single static mount.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: photoprism-originals-pv
spec:
  capacity:
    storage: 500Gi # nominal — NFS doesn't hard-enforce this, it's informational for K8s scheduling/quota purposes only
  accessModes:
    - ReadWriteMany
  nfs:
    server: 10.0.10.15
    path: /mnt/storage/photoprism
  persistentVolumeReclaimPolicy: Retain
  storageClassName: "" # deliberately unset — this is static binding, not a StorageClass-driven dynamic claim
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: photoprism-originals
  namespace: photoprism
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 500Gi
  volumeName: photoprism-originals-pv
