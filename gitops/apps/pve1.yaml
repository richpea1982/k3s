apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-pve1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/richpea1982/k3s
    targetRevision: HEAD
    path: gitops/manifests/pve1
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
