apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "30.0.2"
    helm:
      values: |
        providers:
          kubernetesCRD:
            enabled: true
          kubernetesIngress:
            enabled: true
        # Per-request access logs — needed to actually see what Traefik
        # decides (matched router, middleware verdicts, client IP, status
        # code) instead of only controller/startup noise. Off by default.
        logs:
          access:
            enabled: true
            fields:
              headers:
                defaultMode: keep
        # RWO Ceph RBD volume (acme.json) can only attach to one pod at a
        # time. The chart's default RollingUpdate strategy tries to bring
        # the new pod up before releasing the old one's volume attachment
        # — guaranteed deadlock with a single-replica RWO-backed workload.
        # Same fix as vaultwarden's Deployment, same underlying reason.
service:
  externalTrafficPolicy: Local

        updateStrategy:
          type: Recreate
          rollingUpdate: null
        # --- ACME / Let's Encrypt via Cloudflare DNS-01 ---
        # Used for internal-only *.pearsalls.fr hosts (e.g. vault.pearsalls.fr)
        # that never get a Cloudflare Tunnel entry and are never publicly
        # reachable. DNS-01 only requires proving control of the DNS zone —
        # it does NOT require the hostname to resolve to anything real or
        # be reachable from the internet. No A/CNAME record is created for
        # these hosts; resolution happens purely via local /etc/hosts
        # overrides on admin devices, same as the current .local.lan scheme.
        additionalArguments:
          - "--certificatesresolvers.cloudflare.acme.email=rpearsall1982@gmail.com"
          - "--certificatesresolvers.cloudflare.acme.storage=/data/acme.json"
          - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
          - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
          - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
          # Confirmed working end-to-end against staging (2026-07-18) — cert
          # for vault.pearsalls.fr issued successfully. Reverting to
          # production (default, no caserver override needed below).
          # - "--certificatesresolvers.cloudflare.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
        envFrom:
          - secretRef:
              # Provides CF_DNS_API_TOKEN — a Cloudflare API token scoped to
              # Zone:DNS:Edit on the pearsalls.fr zone ONLY (not the Tunnel
              # token, not a Global API Key). Created manually, not in Git —
              # see TRAEFIK-TLS-README.md.
              name: traefik-cloudflare-dns-token
        # acme.json must survive pod restarts, or every restart re-requests
        # every cert and risks the Let's Encrypt rate limit.
        persistence:
          enabled: true
          storageClass: ceph-rbd
          size: 1Gi
          path: /data
        # Ceph RBD's CSI driver doesn't reliably honor the pod's fsGroup
        # (a common limitation, not unique to this setup) — the fresh PVC
        # comes back root:root, and Traefik's non-root container (UID
        # 65532) can't write acme.json to it. This is the Traefik Helm
        # chart's own documented workaround for exactly this class of
        # problem (see the chart's values.yaml comments for
        # deployment.initContainers).
        deployment:
          initContainers:
            - name: volume-permissions
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  touch /data/acme.json
                  chmod 600 /data/acme.json
                  chown -R 65532:65532 /data
              volumeMounts:
                - name: data
                  mountPath: /data
              securityContext:
                runAsNonRoot: false
                runAsUser: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
