apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin-ingress
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/richpea1982/k3s
    targetRevision: HEAD
    path: gitops/manifests/jellyfin-ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
